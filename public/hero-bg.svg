<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pakistanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#047857;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#065f46;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="sunGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.1" />
    </radialGradient>

    <pattern id="geometricPattern" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="200" height="200" fill="none"/>
      <circle cx="50" cy="50" r="3" fill="#ffffff" opacity="0.1"/>
      <circle cx="150" cy="50" r="2" fill="#ffffff" opacity="0.08"/>
      <circle cx="50" cy="150" r="2" fill="#ffffff" opacity="0.08"/>
      <circle cx="150" cy="150" r="3" fill="#ffffff" opacity="0.1"/>
      <path d="M100 20 L110 40 L90 40 Z" fill="#ffffff" opacity="0.05"/>
      <path d="M180 100 L190 120 L170 120 Z" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Main gradient background -->
  <rect width="1920" height="1080" fill="url(#pakistanGradient)"/>

  <!-- Sun-like element -->
  <circle cx="1600" cy="200" r="120" fill="url(#sunGradient)"/>
  <circle cx="1600" cy="200" r="80" fill="#fbbf24" opacity="0.2"/>

  <!-- Mountains silhouette -->
  <path d="M0 600 L200 400 L400 500 L600 350 L800 450 L1000 380 L1200 480 L1400 420 L1600 500 L1800 450 L1920 520 L1920 1080 L0 1080 Z" fill="#065f46" opacity="0.3"/>

  <!-- Geometric pattern overlay -->
  <rect width="1920" height="1080" fill="url(#geometricPattern)"/>

  <!-- Floating elements -->
  <g opacity="0.1">
    <!-- Crescent moon -->
    <path d="M 200 150 Q 220 130 250 150 Q 220 170 200 150 Z" fill="#ffffff"/>
    <circle cx="225" cy="140" r="8" fill="#ffffff"/>

    <!-- Stars -->
    <circle cx="400" cy="100" r="2" fill="#ffffff"/>
    <circle cx="600" cy="80" r="1.5" fill="#ffffff"/>
    <circle cx="800" cy="120" r="2" fill="#ffffff"/>
    <circle cx="1000" cy="90" r="1.5" fill="#ffffff"/>
    <circle cx="1200" cy="110" r="2" fill="#ffffff"/>
  </g>

  <!-- Decorative circles with better positioning -->
  <circle cx="300" cy="300" r="80" fill="#ffffff" opacity="0.05"/>
  <circle cx="1400" cy="700" r="100" fill="#ffffff" opacity="0.03"/>
  <circle cx="800" cy="900" r="60" fill="#ffffff" opacity="0.04"/>
  <circle cx="150" cy="800" r="70" fill="#ffffff" opacity="0.03"/>
</svg>